<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industriepark Ost</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #050505;
      color: #f2f2f2;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background: #000;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 44px;
      font-size: 14px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 34px;
      align-items: center;
    }

    .navbar a {
      display: inline-block;
      transform: scaleY(1.65);
      opacity: 0.95;
    }

    .navbar a:hover {
      animation: hardGlitch 0.09s infinite;
      text-shadow: 3px 0 #fff, -3px 0 #777, 0 2px #222;
    }

    .nav-right i {
      font-size: 22px;
      transform: scaleY(0.75);
    }

    @keyframes hardGlitch {
      0% { transform: translate(0,0) skewX(0deg) scaleY(1.65); }
      20% { transform: translate(-3px,1px) skewX(8deg) scaleY(1.75); }
      40% { transform: translate(3px,-1px) skewX(-8deg) scaleY(1.55); }
      60% { transform: translate(-1px,2px) skewX(12deg) scaleY(1.8); }
      80% { transform: translate(2px,-2px) skewX(-10deg) scaleY(1.5); }
      100% { transform: translate(0,0) skewX(0deg) scaleY(1.65); }
    }

    .hero {
      position: relative;
      margin-top: 110px;
      height: calc(100vh - 110px);
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    .hero-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      pointer-events: none;
    }

    section {
      padding: 90px 40px;
      max-width: 1000px;
      margin: 0 auto;
      scroll-margin-top: 130px;
    }

    h2 {
      font-size: 34px;
      font-weight: 200;
      margin-bottom: 34px;
      text-transform: uppercase;
      letter-spacing: 6px;
      transform: scaleY(1.35);
      transform-origin: left center;
    }

    .dates { display: grid; gap: 18px; }

    .date {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 18px;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin-bottom: 34px;
      border-radius: 12px;
      background: #111;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .embed {
      margin-top: 28px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      filter: grayscale(100%);
      transition: 0.25s ease;
    }

    .gallery-grid img:hover {
      filter: grayscale(0%);
      transform: scale(1.025);
    }

    .about p,
    #kontakt p {
      font-size: 20px;
      line-height: 1.6;
      max-width: 760px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    footer {
      padding: 50px 40px;
      text-align: center;
      color: #aaa;
      border-top: 1px solid #222;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }

    @media (max-width: 700px) {
      .navbar {
        height: 118px;
        padding: 22px 18px;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        font-size: 11px;
        letter-spacing: 2.2px;
      }

      .nav-left {
        width: 100%;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .nav-right {
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 28px;
      }

      .navbar a {
        transform: scaleY(1.35);
      }

      .nav-right i {
        font-size: 21px;
        transform: scaleY(0.8);
      }

      .hero {
        margin-top: 118px;
        height: calc(100vh - 118px);
      }

      .hero-video {
        object-fit: cover;
        object-position: center center;
      }

      section {
        padding: 70px 22px;
        scroll-margin-top: 140px;
      }

      h2 {
        font-size: 27px;
        letter-spacing: 4px;
      }

      .date {
        flex-direction: column;
        font-size: 16px;
      }

      .gallery-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="#live">Live</a>
      <a href="#musik">Musik</a>
      <a href="#galerie">Galerie</a>
      <a href="#kontakt">Kontakt</a>
    </div>

    <div class="nav-right">
      <a href="https://www.instagram.com/industrieparkost/" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://open.spotify.com/artist/103iVpHufJ5xn1CC4t3Qtl?si=JvsmMMMAR0mzXY_K-Yb2ig" target="_blank" aria-label="Spotify">
        <i class="fab fa-spotify"></i>
      </a>
      <a href="https://www.youtube.com/watch?v=HsxW8jKIYv8" target="_blank" aria-label="YouTube">
        <i class="fab fa-youtube"></i>
      </a>
    </div>
  </nav>

  <header class="hero">
    <video class="hero-video" autoplay muted loop playsinline preload="auto">
      <source src="InduVideo.mp4" type="video/mp4">
    </video>
  </header>

  <section id="live">
    <h2>Live Dates</h2>
    <div class="dates">
      <div class="date">
        <span>Neue Dates bald</span>
        <span>2026</span>
      </div>
    </div>
  </section>

  <section id="musik">
    <h2>Musik</h2>

    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/HsxW8jKIYv8"
        title="Industriepark Ost Video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <iframe
      class="embed"
      src="https://open.spotify.com/embed/artist/103iVpHufJ5xn1CC4t3Qtl"
      width="100%"
      height="352"
      frameborder="0"
      allowfullscreen
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </section>

  <section id="galerie">
    <h2>Galerie</h2>
    <div class="gallery-grid">
      <img src="bild1.jpg" alt="Galerie Bild 1">
      <img src="bild2.jpg" alt="Galerie Bild 2">
      <img src="bild3.jpg" alt="Galerie Bild 3">
      <img src="bild4.jpg" alt="Galerie Bild 4">
      <img src="bild5.jpg" alt="Galerie Bild 5">
      <img src="bild6.jpg" alt="Galerie Bild 6">
    </div>
  </section>

  <section class="about">
    <h2>Über Uns</h2>
    <p>
      Industriepark Ost aus Freiburg. Irgendwo zwischen Supermarkt-Wave,
      Shoegaze, Grunge und kaputten Leuchtreklamen.
    </p>
  </section>

  <section id="kontakt">
    <h2>Kontakt</h2>
    <p>
      Booking / Anfragen:
      <a href="mailto:industrieparkost@gmail.com">industrieparkost@gmail.com</a>
    </p>
  </section>

  <footer>
    © 2026 Industriepark Ost
  </footer>

</body>
</html>
